{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-success text-white">

            <h3>{{ title }}</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">

                        Customer

                    </label>

                    {{ form.customer }}

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Status

                    </label>

                    {{ form.status }}

                </div>

                <div class="mt-4">

                    <a href="{% url 'sales_order_list' %}"
                       class="btn btn-secondary">

                        Cancel

                    </a>

                    <button
                        type="submit"
                        class="btn btn-success">

                        Save Sales Order

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
