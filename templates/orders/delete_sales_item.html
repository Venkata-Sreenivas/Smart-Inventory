{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-danger text-white">

            <h3>Delete Sales Item</h3>

        </div>

        <div class="card-body">

            <p>

                Are you sure you want to remove

                <strong>{{ item.product.name }}</strong>

                from this sales order?

            </p>

            <form method="POST">

                {% csrf_token %}

                <a href="{% url 'sales_order_detail' item.sales_order.id %}"
                   class="btn btn-secondary">

                    Cancel

                </a>

                <button type="submit"
                        class="btn btn-danger">

                    Delete Item

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
