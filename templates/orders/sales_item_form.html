{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-success text-white">

            <h3>

                {% if title %}
                    {{ title }}
                {% else %}
                    Add Product
                {% endif %}

            </h3>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">

                        Product

                    </label>

                    {{ form.product }}

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Quantity

                    </label>

                    {{ form.quantity }}

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Selling Price

                    </label>

                    {{ form.selling_price }}

                </div>

                <div class="mt-4">

                    <a href="{% url 'sales_order_detail' order.id %}"
                       class="btn btn-secondary">

                        Cancel

                    </a>

                    <button
                        type="submit"
                        class="btn btn-success">

                        Save

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function () {

    const productSelect = document.getElementById("id_product");

    const priceInput = document.getElementById("id_selling_price");

    function loadPrice() {

        const productId = productSelect.value;

        if (!productId) {

            priceInput.value = "";

            return;

        }

        fetch(`/sales/product-price/${productId}/`)

            .then(response => response.json())

            .then(data => {

                priceInput.value = data.price;

            })

            .catch(error => {

                console.error("Error fetching price:", error);

            });

    }

    productSelect.addEventListener("change", loadPrice);

    if (productSelect.value && !priceInput.value) {

        loadPrice();

    }

});

</script>

{% endblock %}
