{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-success text-white">

            <h3>Add Product to {{ order.order_number }}</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">

                        Product

                    </label>

                    {{ form.product }}

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Quantity

                    </label>

                    {{ form.quantity }}

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Purchase Price

                    </label>

                    {{ form.purchase_price }}

                </div>

                <button
                    type="submit"
                    class="btn btn-success">

                    Save Product

                </button>

                <a
                    href="{% url 'purchase_order_detail' order.id %}"
                    class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
