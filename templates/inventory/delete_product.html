{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h3 class="text-danger">

                Delete Product

            </h3>

            <p>

                Are you sure you want to delete

                <strong>{{ product.name }}</strong>?

            </p>

            <form method="POST">

                {% csrf_token %}

                <button class="btn btn-danger">

                    Delete

                </button>

                <a href="{% url 'product_list' %}"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
