{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>Sales Report</h2>

        <h4>

            Revenue :
            ₹ {{ total_revenue }}

        </h4>

    </div>

    <form method="GET" class="row mb-3">

        <div class="col-md-10">

            <input
                type="text"
                name="search"
                class="form-control"
                placeholder="Search Customer"
                value="{{ search }}">

        </div>

        <div class="col-md-2">

            <button class="btn btn-primary w-100">

                Search

            </button>

        </div>

    </form>

    <div class="card shadow">

        <div class="card-body">

            <table class="table table-striped">

                <thead class="table-dark">

                    <tr>

                        <th>Invoice</th>

                        <th>Customer</th>

                        <th>Date</th>

                        <th>Status</th>

                    </tr>

                </thead>

                <tbody>

                    {% for order in orders %}

                    <tr>

                        <td>{{ order.invoice_number }}</td>

                        <td>{{ order.customer }}</td>

                        <td>{{ order.order_date }}</td>

                        <td>{{ order.status }}</td>

                    </tr>

                    {% empty %}

                    <tr>

                        <td colspan="4" class="text-center">

                            No Sales Orders

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
